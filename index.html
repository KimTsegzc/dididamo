<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摩的出行一期移动端 MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Ma+Shan+Zheng&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
    </div>

    <main class="phone-wrap">
      <section class="phone-shell">
        <header class="mobile-head">
          <div>
            <div class="brand">MotoFlow</div>
            <div class="sub">摩的出行 一期演示版</div>
          </div>
          <button id="roleSwitchBtn" class="chip">切换角色</button>
        </header>

        <section id="view" class="screen"></section>

        <footer class="mobile-foot">
          <nav id="mobileTabs" class="mobile-tabs"></nav>
        </footer>
      </section>

      <section class="dock">
        <div class="dock-card">
          <h3>全局配置</h3>
          <label>高德 KEY</label>
          <input id="gaodeKeyInput" placeholder="window.GAODE_API_KEY" />
          <button id="saveKeyBtn" class="btn">保存到全局变量</button>
          <p id="roleLabel" class="note"></p>
          <p id="statusLabel" class="note"></p>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
