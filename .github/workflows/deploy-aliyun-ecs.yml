name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

env:
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  ECS_PROJECT_PATH: ${{ secrets.ECS_PROJECT_PATH }}
  PORT: 4173

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          test -n "$ECS_HOST" || (echo "[ERR] ECS_HOST is empty" && exit 1)
          test -n "$ECS_USER" || (echo "[ERR] ECS_USER is empty" && exit 1)
          test -n "$ECS_PROJECT_PATH" || (echo "[ERR] ECS_PROJECT_PATH is empty" && exit 1)
          test -n "${{ secrets.ECS_SSH_PRIVATE_KEY }}" || (echo "[ERR] ECS_SSH_PRIVATE_KEY is empty" && exit 1)

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: SSH connectivity preflight
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -o BatchMode=yes \
            "$ECS_USER@$ECS_HOST" \
            "echo '[OK] SSH connected'; whoami; mkdir -p '$ECS_PROJECT_PATH'"

      - name: Sync project files to ECS
        run: |
          RSYNC_RSH="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o BatchMode=yes"
          rsync -avz --delete -e "$RSYNC_RSH" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'start/.server-pid.txt' \
            --exclude '*.log' \
            --exclude 'nohup.out' \
            ./ "$ECS_USER@$ECS_HOST:$ECS_PROJECT_PATH/"

      - name: Restart service
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -o BatchMode=yes \
            "$ECS_USER@$ECS_HOST" \
            "set -e; cd '$ECS_PROJECT_PATH'; pkill -f 'node server.js' || true; nohup node server.js > app.log 2>&1 &"

      - name: Health check on ECS
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -o BatchMode=yes \
            "$ECS_USER@$ECS_HOST" \
            "for i in {1..30}; do curl -fsS http://localhost:$PORT >/dev/null && echo '[OK] service up' && exit 0; sleep 1; done; echo '[ERR] service not up'; tail -n 120 '$ECS_PROJECT_PATH/app.log' || true; exit 1"
