name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

env:
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  ECS_PROJECT_PATH: ${{ secrets.ECS_PROJECT_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files to ECS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'start/.server-pid.txt' \
            --exclude '*.log' \
            ./ "$ECS_USER@$ECS_HOST:$ECS_PROJECT_PATH/"

      - name: Restart app on ECS
        run: |
          ssh "$ECS_USER@$ECS_HOST" << 'EOFSH'
          set -e
          cd '$ECS_PROJECT_PATH'
          echo "Stopping existing service..."
          pkill -f 'node server.js' || true
          sleep 2
          echo "Starting new service..."
          chmod +x start/*.sh || true
          nohup node server.js > app.log 2>&1 &
          sleep 3
          echo "Waiting for service to be ready..."
          for i in {1..30}; do
            if nc -z localhost 4173 2>/dev/null; then
              echo "✅ Service is ready on port 4173!"
              break
            fi
            echo "Service not ready yet ($i/30)... waiting"
            sleep 1
          done
          echo "Deployment completed"
          EOFSH
