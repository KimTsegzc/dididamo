name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

env:
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  ECS_PROJECT_PATH: ${{ secrets.ECS_PROJECT_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files to ECS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'start/.server-pid.txt' \
            --exclude '*.log' \
            ./ "$ECS_USER@$ECS_HOST:$ECS_PROJECT_PATH/"

      - name: Restart app on ECS
        run: |
          ssh -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" "cd $ECS_PROJECT_PATH && pkill -f 'node server.js' || true && sleep 2 && nohup node server.js > app.log 2>&1 & echo 'Service started, waiting...' && sleep 3 && for i in {1..30}; do curl -s http://localhost:4173 > /dev/null && echo 'Service ready!' && exit 0; sleep 1; done; echo 'Service startup completed'"
