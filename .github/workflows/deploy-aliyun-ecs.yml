name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

env:
  ECS_HOST: ${{ secrets.ECS_HOST }}
  ECS_USER: ${{ secrets.ECS_USER }}
  ECS_PROJECT_PATH: ${{ secrets.ECS_PROJECT_PATH }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$ECS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync project files to ECS
        run: |
          if ! command -v rsync &> /dev/null; then
            apt-get update && apt-get install -y rsync
          fi
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'start/.server-pid.txt' \
            --exclude '*.log' \
            --exclude 'nohup.out' \
            ./ "$ECS_USER@$ECS_HOST:$ECS_PROJECT_PATH/"

      - name: Deploy and restart service
        env:
          PROJECT_PATH: ${{ secrets.ECS_PROJECT_PATH }}
          PORT: 4173
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$ECS_USER@$ECS_HOST" << EOF
          set -e
          PROJECT_PATH="$PROJECT_PATH"
          PORT="$PORT"
          echo "[1] Stopping existing Node.js process..."
          pkill -f 'node server.js' || true
          sleep 2
          echo "[2] Navigating to project: \$PROJECT_PATH"
          cd "\$PROJECT_PATH" || { echo "ERROR: Directory not found!"; exit 1; }
          pwd
          ls -la
          echo "[3] Starting Node.js server on port \$PORT..."
          chmod +x start/*.sh 2>/dev/null || true
          nohup node server.js > app.log 2>&1 &
          echo "[4] Waiting for service to be ready..."
          sleep 3
          for i in {1..20}; do
            if curl -s http://localhost:\$PORT > /dev/null 2>&1; then
              echo "[SUCCESS] Service is running!"
              exit 0
            fi
            echo "  Attempt \$i/20..."
            sleep 1
          done
          echo "[WARNING] Service check timeout"
          exit 0
          EOF
