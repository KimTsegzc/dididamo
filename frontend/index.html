<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>摩的出行移动端 MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="bg-pattern"></div>

    <main class="phone-wrap">
      <section class="phone-shell">
        <header class="mobile-head">
          <div>
            <div class="brand">滴滴摩的</div>
            <div class="sub">MVP 演示</div>
          </div>
          <button id="roleSwitchBtn" class="chip">切换角色</button>
        </header>

        <section id="view" class="screen"></section>

        <footer class="mobile-foot">
          <nav id="mobileTabs" class="mobile-tabs"></nav>
        </footer>
      </section>

      <section class="dock">
        <div class="dock-card">
          <h3>系统状态</h3>
          <p id="mapConfigLabel" class="note">地图配置读取中...</p>
          <p id="roleLabel" class="note"></p>
          <p id="statusLabel" class="note"></p>
        </div>
      </section>
    </main>

    <script src="/assets/js/app.js"></script>
  </body>
</html>
